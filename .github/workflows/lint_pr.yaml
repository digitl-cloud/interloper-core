name: "Lint PR"

on:
  pull_request:

permissions:
  pull-requests: read
  statuses: write

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          scopes: |
            core
            argo
            assets
            dbos
            docker
            google-cloud
            k8s
            pandas
            sql
            ci
            deps
            docs
          requireScope: false
