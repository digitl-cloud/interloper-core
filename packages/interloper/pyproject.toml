# ###############
# PROJECT / UV
# ###############
[project]
name = "interloper"
version = "0.0.0"
description = "Interloper"
authors = [{ name = "Guillaume Onfroy", email = "guillaume@digitlcloud.com" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.11.7",
    "pydantic-settings>=2.11.0",
    "httpx>=0.28.1",
]

[project.optional-dependencies]
cli = ["pyyaml>=6.0.0", "rich>=14.3.2"]

[dependency-groups]
dev = ["pytest>=8.0.0", "pytest-cov>=7.0.0"]

[build-system]
requires = ["uv_build>=0.9.5,<0.10.0"]
build-backend = "uv_build"

[project.scripts]
interloper = "interloper.cli.main:main"

# ###############
# RUFF
# ###############
[tool.ruff]
line-length = 120

[tool.ruff.lint]
preview = true
extend-select = ["E", "I", "UP", "ANN001", "ANN201", "ANN202", "DOC", "D"]
ignore = ["D104"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/**" = ["ANN", "D102", "F811", "B018", "D101"]
"src/**" = ["DOC201", "DOC501"]

# ###############
# PYRIGHT
# ###############
[tool.pyright]
include = ["src"]
typeCheckingMode = "basic"
reportMissingParameterType = true
ignore = ["libs/**", "tests/**", "scripts/**"]

# ###############
# PYTEST
# ###############
[tool.pytest.ini_options]
filterwarnings = ["ignore::DeprecationWarning"]
